<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YetAnotherOnlineDrum</title>
    <link rel="stylesheet" href="./style/style.css" />
    <link rel="stylesheet" href="./style/animation.css" />
    <link rel="stylesheet" href="./style/reset.css" />
    <link rel="stylesheet" href="./style/popover.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap"
      rel="stylesheet"
    />

    <!-- social preview  -->
    <meta property="og:title" content="Just another online drum for fun!" />
    <meta
      property="og:description"
      content="An online drum, playing drum using keyboard."
    />
    <meta
      property="og:image"
      content="https://moy-the-y.github.io/res/social-preview/social-preview.png"
    />
    <meta property="og:url" content="" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div class="drumkit">
      <div id="drumkit__pop-triggers-group">
        <div class="drumpart-pop-trigger" id="drumpart-pop-trigger-snare"></div>
        <div
          class="drumpart-pop-trigger"
          id="drumpart-pop-trigger-hihat-open"
        ></div>
        <div
          class="drumpart-pop-trigger"
          id="drumpart-pop-trigger-hihat-close"
        ></div>
        <div class="drumpart-pop-trigger" id="drumpart-pop-trigger-crash"></div>
        <div class="drumpart-pop-trigger" id="drumpart-pop-trigger-tom1"></div>
        <div class="drumpart-pop-trigger" id="drumpart-pop-trigger-tom2"></div>
        <div class="drumpart-pop-trigger" id="drumpart-pop-trigger-tom3"></div>
        <div class="drumpart-pop-trigger" id="drumpart-pop-trigger-kick"></div>
        <div class="drumpart-pop-trigger" id="drumpart-pop-trigger-ride"></div>
      </div>

      <img
        src="./res/visual/drumkit-ascii.png"
        class="drumkit__img"
        draggable="false"
      />
    </div>

    <!-- #region Popovers -->
    <div
      class="popover popover--style popover-1"
      id="save-preset-popover"
      style="display: none"
    >
      <div class="popover-1__main">
        <div class="popover-1__main__component">
          <label for="preset-name" class="popover-1__label">preset name</label>
          <input
            type="text"
            name="preset-name"
            id="save-preset__input-name"
            class="popover-1__input short-text-input"
            minlength="1"
            maxlength="15"
            autocomplete="off"
            placeholder="type here..."
          />
        </div>
        <div class="popover-1__main__component">
          <label for="preset-color" class="popover-1__label">color</label>
          <input
            type="color"
            name="preset-color"
            id="save-preset__input-color"
            class="popover-1__input color-picker"
            value="#2FB191"
          />
        </div>
      </div>
      <div class="popover-1__button-group">
        <button id="confirm" class="popover-1__button" draggable="false">
          🗸
        </button>
        <button id="cancel" class="popover-1__button" draggable="false">
          𐄂
        </button>
      </div>
    </div>
    <div
      class="popover popover--style load-preset-popover"
      id="load-preset-popover"
      style="display: none"
    >
      <div
        class="load-preset-popover__main"
        id="load-preset-popover__main"
      ></div>
    </div>
    <div
      class="popover popover--style drumpart-popover"
      id="drumkit-snare-popover"
      style="display: none"
    >
      <div class="drumpart-popover__main">
        <div class="drumpart-popover__main__component">
          <label for="snare-volume">volume</label>
          <input
            type="range"
            class="slider slider--vertical"
            id="snare-volume"
            min="0"
            max="1.5"
            step="0.05"
            value="0.75"
          />
        </div>
        <div class="drumpart-popover__main__component">
          <label for="snare-tone">tone</label>
          <select name="snare-tone" id="snare-tone" class="select--style">
            <option value="rock">rock</option>
            <option value="punk">punk</option>
          </select>
        </div>
      </div>
      <div class="drumpart-popover-button-group">
        <button id="confirm" draggable="false">🗸</button>
        <button id="reset" draggable="false">↺</button>
        <button id="cancel" draggable="false">𐄂</button>
      </div>
    </div>
    <div
      class="popover popover--style drumpart-popover"
      id="drumkit-hihat-open-popover"
      style="display: none"
    >
      <div class="drumpart-popover__main">

          <label for="hihat-open-volume">volume</label>

            class="slider slider--vertical"
            id="hihat-open-volume"
            min="0"
            max="1.5"
            step="0.05"
            value="0.75"
          />
        </div>
        <div class="drumpart-popover__main__component">
          <label for="hihat-open-tone">tone</label>
          <select
            name="hihat-open-tone"
            id="hihat-open-tone"
            class="select--style"
          >
            <option value="rock">rock</option>
            <option value="punk">punk</option>
          </select>
        </div>
      </div>
      <div class="drumpart-popover-button-group">
        <button id="confirm" draggable="false">🗸</button>
        <button id="reset" draggable="false">↺</button>
        <button id="cancel" draggable="false">𐄂</button>
      </div>
    </div>

    </div>

        <div class="drumpart-popover__main__component">

      <div class="drumpart-popover-button-group">

        <button id="cancel" draggable="false">𐄂</button>
      </div>
    </div>
    <div
      class="popover popover--style drumpart-popover"

      style="display: none"
    >
      <div class="drumpart-popover__main">
        <div class="drumpart-popover__main__component">

          />
        </div>
        <div class="drumpart-popover__main__component">
          <label for="tom1-tone">tone</label>
          <select name="tom1-tone" id="tom1-tone" class="select--style">
            <option value="rock">rock</option>
            <option value="punk">punk</option>
          </select>
        </div>
      </div>
      <div class="drumpart-popover-button-group">
        <button id="confirm" draggable="false">🗸</button>
        <button id="reset" draggable="false">↺</button>

      </div>
    </div>
    <div

      <div class="drumpart-popover__main">

    <div
      class="popover popover--style drumpart-popover"
      id="drumkit-tom3-popover"
      style="display: none"
    >
      <div class="drumpart-popover__main">
        <div class="drumpart-popover__main__component">
          <label for="tom3-volume">volume</label>
          <input
            type="range"

            step="0.05"
            value="0.75"
          />
        </div>
        <div class="drumpart-popover__main__component">
          <label for="tom3-tone">tone</label>
          <select name="tom3-tone" id="tom3-tone" class="select--style">
            <option value="rock">rock</option>

      <div class="drumpart-popover-button-group">

        <button id="reset" draggable="false">↺</button>

      </div>

    <!-- #endregion -->

    <div class="preset-button-group">
      <button class="preset-button" id="save-preset-button" draggable="false">
        save preset
      </button>
      <button class="preset-button" id="load-preset-button" draggable="false">
        load preset
      </button>
    </div>
    <input
      type="range"
      name="volume"
      class="slider slider--master"
      id="volume-slider"
      min="0.3"
      max="1.5"
      step="0.05"
      value="0.9"
    />
    <div class="ticker-container" id="ticker-container">
      <div
        class="ticker__cover ticker__cover-left"
        id="ticker__cover-left"
      ></div>
      <div class="ticker__show-area" id="ticker__show-area"></div>
      <span class="ticker__text" id="ticker__text"
        >snare:a/s &nbsp kick:z/x &nbsp closed-hihat:r/t &nbsp opened-hihat:w/e
        &nbsp crash:y &nbsp ride:u &nbsp toms:g,h,j</span
      >
      <div
        class="ticker__cover ticker__cover-right"
        id="ticker__cover-right"
      ></div>
    </div>
  </body>
  <script type="module" src="./src/main.js"></script>
</html>
